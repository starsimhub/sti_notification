# Exp 24 — concentrated-sustained hand-picked v1
n_agents: 10000
start: 1985
stop: 2040
seeds: [101, 102, 103]

# Hand-picked configuration
config:
  syph.beta_m2f:              0.20
  syph.time_to_undetectable:  20.0
  syph.p_symp_primary_f:      0.50
  syph.p_symp_primary_m:      0.80
  syph.rel_init_prev:         0.20
  syph_symp_test.rel_test:    1.30
  structuredsexual.prop_f0:   0.55   # WRONG DIRECTION — should have been HIGHER, not lower
  structuredsexual.m1_conc:   0.20
  structuredsexual.dur_sw:    15.0
  hiv.beta_m2f:               0.025
  ng.beta_m2f:                0.10
  ct.beta_m2f:                0.10
  tv.beta_m2f:                0.20

# Boosted FSW/RG2/men care-seeking
symp_test_csv: data/symp_test_prob_concentrated.csv

# Defensible ANC ramp (peak 70% by 2018, 85% by 2030)
anc_probs: [0.20, 0.30, 0.40, 0.35, 0.55, 0.70, 0.85]
anc_years: [1980, 1990, 1999, 2008, 2012, 2018, 2040]

# Success criteria
targets:
  fsw_prev_2019:  [0.20, 0.40]
  nontrep_f_2016: [0.004, 0.016]
  primary_share:  [0.50, 0.65]
  secondary_share: [0.25, 0.40]
